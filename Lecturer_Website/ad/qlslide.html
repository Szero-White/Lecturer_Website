      <div class="container mt-5">
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Nhập hình ảnh slide</h5>
                        <form id="dataForm">
                            <div class="mb-3">
                                <label for="id_hoat_dong" class="form-label">ID Ảnh:</label>
                                <input type="text" class="form-control" id="id_hoat_dong" required>
                            </div>
                            <div class="mb-3">
                                <label for="image" class="form-label">Hình ảnh:</label>
                                <input type="file" class="form-control" id="image" accept="image/*" required>
                            </div>
                            <button type="submit" class="btn btn-light text-dark">Gửi</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <div id="displayInfo"></div>
                        <div class="mt-3">
                            <h5 class="card-title">Bảng Kiểm Tra</h5>
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th scope="col">ID Ảnh</th>
                                        <th scope="col">Hình Ảnh</th>
                                        <th scope="col">Tác Vụ</th> <!-- Cột mới cho các hành động -->
                                    </tr>
                                </thead>
                                <tbody id="dataTable">
                                    <!-- Dữ liệu sẽ được thêm vào đây -->
                                    <tr>
                                        <td>1</td>
                                        <td><img src="../anh/6_2.jpg" style="width: 100px; height: 100px;"></td>
                                        <td> <!-- Ô mới cho các hành động -->
                                            <button onclick="editRow(this)" class="btn btn-light text-dark">Chỉnh sửa</button>
                                            <button onclick="deleteRow(this)" class="btn btn-light text-dark">Xóa</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>2</td>
                                        <td><img src="../anh/428616448_794746956013020_677024099615791303_n.png" style="width: 100px; height: 100px;"></td>
                                        <td> <!-- Ô mới cho các hành động -->
                                            <button onclick="editRow(this)" class="btn btn-light text-dark">Chỉnh sửa</button>
                                            <button onclick="deleteRow(this)" class="btn btn-light text-dark">Xóa</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>3</td>
                                        <td><img src="../anh/428612378_793719172782465_7374495241413609233_n.jpg" style="width: 100px; height: 100px;"></td>
                                        <td> <!-- Ô mới cho các hành động -->
                                            <button onclick="editRow(this)" class="btn btn-light text-dark">Chỉnh sửa</button>
                                            <button onclick="deleteRow(this)" class="btn btn-light text-dark">Xóa</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    
    
    
    
    <script>
        document.getElementById("dataForm").addEventListener("submit", function(event) {
            event.preventDefault();
            var idHoatDong = document.getElementById("id_hoat_dong").value;
            var message = document.getElementById("message").value;
            var image = document.getElementById("image").files[0];
    
            var displayDiv = document.getElementById("displayInfo");
    
            // Hiển thị thông tin văn bản
            displayDiv.innerHTML = `
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Thông Tin Nhập</h5>
                        <p><strong>ID Hoạt Động:</strong> ${idHoatDong}</p>
                        <p><strong>Nội dung:</strong> ${message}</p>
                    </div>
                </div>
            `;
    
            // Thêm dữ liệu vào bảng kiểm tra
            var dataTable = document.getElementById("dataTable");
            var newRow = dataTable.insertRow();
            var cell1 = newRow.insertCell(0);
            var cell2 = newRow.insertCell(1);
            var cell3 = newRow.insertCell(2);
            cell1.innerHTML = idHoatDong;
            cell2.innerHTML = `<div style="width: 100px; height: 100px; background-color: lightgray;"></div>`; // Thay vì image, sử dụng div vuông
            cell3.innerHTML = message;
        });
    </script>
    
</body>
